services:
  # Backend API
  - type: web
    name: landchat-backend
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false # User must set this in dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false # User must set this in dashboard

  # Frontend Static Site
  - type: static
    name: landchat-frontend
    env: static
    plan: free
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        sync: false # Set this to your deployed Backend URL (e.g. https://landchat-backend.onrender.com/api)
      - key: VITE_SUPABASE_URL
        sync: false # User must set this in dashboard
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        sync: false # User must set this in dashboard
      - key: VITE_SUPABASE_PROJECT_ID
        sync: false # User must set this in dashboard
